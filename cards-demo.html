<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Strain Cards - Final Colors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1f2937;
            background-image: radial-gradient(circle at 50% 50%, #1f2937 0%, #030712 100%);
            min-height: 100vh;
            font-family: "Montserrat", sans-serif;
        }

        .title-font {
            font-family: "Playfair Display", serif;
        }

        .premium-card {
            width: 320px;
            padding-bottom: 20px;
            background-color: #121212;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .premium-card:hover {
            transform: translateY(-5px);
        }
        
        /* Theme Colors Generated */
        
        .theme-sativa {
            border: 2px solid #adff00;
            box-shadow: 0 0 15px rgba(173, 255, 0, 0.3), inset 0 0 10px rgba(173, 255, 0, 0.1);
        }
        .theme-sativa .accent-text { color: #adff00; }
    
        .theme-hybrid {
            border: 2px solid #00a3ff;
            box-shadow: 0 0 15px rgba(0, 163, 255, 0.3), inset 0 0 10px rgba(0, 163, 255, 0.1);
        }
        .theme-hybrid .accent-text { color: #00a3ff; }
    
        .theme-indica {
            border: 2px solid #cb00ff;
            box-shadow: 0 0 15px rgba(203, 0, 255, 0.3), inset 0 0 10px rgba(203, 0, 255, 0.1);
        }
        .theme-indica .accent-text { color: #cb00ff; }
    
    </style>
</head>
<body class="p-10 text-white flex flex-col items-center">

    <h1 class="text-4xl text-center mb-4 title-font italic font-bold">Ausgewählte Sortenfarben</h1>
    <p class="text-center text-gray-400 mb-12 tracking-widest uppercase text-sm">
        Sativa (Farbe 12) | Hybrid (Farbe 29) | Indica (Farbe 41)
    </p>
    
    <div class="flex flex-wrap justify-center gap-10 max-w-7xl w-full">
        
        <!-- ==========================================
                CARD: SATIVA
                ========================================== -->
        <div class="premium-card theme-sativa flex flex-col">
            <div class="p-6 pb-4">
                <h2 class="title-font italic text-2xl text-white font-bold leading-tight uppercase drop-shadow-lg line-clamp-1">
                    Acapulco Gold
                </h2>
                <div class="w-12 h-0.5 mt-2 opacity-70" style="background-color: #adff00"></div>
            </div>

            <div class="px-5 w-full">
                <div class="relative w-full h-[220px] rounded-xl overflow-hidden border border-white/10 shadow-lg">
                    <img src="public/strains/afina.jpg" alt="Strain" class="w-full h-full object-cover">
                    <div class="absolute bottom-2 left-2 bg-black/70 backdrop-blur-md uppercase text-[9px] px-2 py-1 rounded-sm tracking-wider font-bold shadow-md" style="color: #adff00; border: 1px solid #adff0080;">
                        Sativa
                    </div>
                </div>
            </div>

            <div class="px-5 mt-5 w-full">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 shadow-inner backdrop-blur-sm shadow-md">
                    <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-2 mb-2">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">THC</span>
                            <span class="accent-text text-sm font-bold tracking-wide">25%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Aroma</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">CBD</span>
                            <span class="accent-text text-sm font-bold tracking-wide">< 1%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Effect</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- ==========================================
                CARD: HYBRID
                ========================================== -->
        <div class="premium-card theme-hybrid flex flex-col">
            <div class="p-6 pb-4">
                <h2 class="title-font italic text-2xl text-white font-bold leading-tight uppercase drop-shadow-lg line-clamp-1">
                    Pineapple Express
                </h2>
                <div class="w-12 h-0.5 mt-2 opacity-70" style="background-color: #00a3ff"></div>
            </div>

            <div class="px-5 w-full">
                <div class="relative w-full h-[220px] rounded-xl overflow-hidden border border-white/10 shadow-lg">
                    <img src="public/strains/afina.jpg" alt="Strain" class="w-full h-full object-cover">
                    <div class="absolute bottom-2 left-2 bg-black/70 backdrop-blur-md uppercase text-[9px] px-2 py-1 rounded-sm tracking-wider font-bold shadow-md" style="color: #00a3ff; border: 1px solid #00a3ff80;">
                        Hybrid
                    </div>
                </div>
            </div>

            <div class="px-5 mt-5 w-full">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 shadow-inner backdrop-blur-sm shadow-md">
                    <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-2 mb-2">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">THC</span>
                            <span class="accent-text text-sm font-bold tracking-wide">22%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Aroma</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">CBD</span>
                            <span class="accent-text text-sm font-bold tracking-wide">< 1%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Effect</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- ==========================================
                CARD: INDICA
                ========================================== -->
        <div class="premium-card theme-indica flex flex-col">
            <div class="p-6 pb-4">
                <h2 class="title-font italic text-2xl text-white font-bold leading-tight uppercase drop-shadow-lg line-clamp-1">
                    Purple Kush
                </h2>
                <div class="w-12 h-0.5 mt-2 opacity-70" style="background-color: #cb00ff"></div>
            </div>

            <div class="px-5 w-full">
                <div class="relative w-full h-[220px] rounded-xl overflow-hidden border border-white/10 shadow-lg">
                    <img src="public/strains/afina.jpg" alt="Strain" class="w-full h-full object-cover">
                    <div class="absolute bottom-2 left-2 bg-black/70 backdrop-blur-md uppercase text-[9px] px-2 py-1 rounded-sm tracking-wider font-bold shadow-md" style="color: #cb00ff; border: 1px solid #cb00ff80;">
                        Indica
                    </div>
                </div>
            </div>

            <div class="px-5 mt-5 w-full">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 shadow-inner backdrop-blur-sm shadow-md">
                    <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-2 mb-2">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">THC</span>
                            <span class="accent-text text-sm font-bold tracking-wide">28%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Aroma</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500 text-[9px] uppercase tracking-widest font-semibold flex-shrink-0 mr-1">CBD</span>
                            <span class="accent-text text-sm font-bold tracking-wide">< 1%</span>
                        </div>
                        <div class="flex items-center justify-end border-l border-white/5 pl-4 w-full">
                            <span class="text-gray-100 text-[10px] font-medium tracking-wide truncate">Effect</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    </div>
</body>
</html>
