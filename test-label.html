<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Test Label - CannaLog</title>
    <style>
        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .label {
            background: white;
            width: 400px;
            padding: 30px;
            border: 2px solid #000;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
            position: relative;
        }
        .header {
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .content {
            line-height: 1.4;
        }
        .strain-name {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 10px 0;
            background: #000;
            color: #fff;
            padding: 5px 10px;
            display: inline-block;
        }
        .stats {
            margin-top: 20px;
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .barcode {
            margin-top: 30px;
            height: 40px;
            background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px);
            width: 100%;
        }
        .footer {
            margin-top: 15px;
            font-size: 10px;
            color: #666;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="label">
        <div class="header">
            <div class="brand">CannaLog Medical</div>
            <div style="font-size: 10px;">Charge: SG-2026-X</div>
        </div>
        <div class="content">
            <div style="font-size: 12px; font-weight: bold; color: #444;">Medizinisches Cannabis:</div>
            <div class="strain-name">Sour Goth Girl Kush</div>
            
            <div class="stats">
                <div>THC: 24.5%</div>
                <div>CBD: < 1.0%</div>
                <div>GENETIK: INDICA</div>
                <div>HERKUNFT: APOTHEKE</div>
            </div>
        </div>
        <div class="barcode"></div>
        <div class="footer">
            Nur für den medizinischen Gebrauch bestimmt
        </div>
    </div>
</body>
</html>
