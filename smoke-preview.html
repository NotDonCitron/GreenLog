<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLog Comic Radial Smoke</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            min-height: 100vh;
        }

        .banner {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(45deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .comic-weiss {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            color: #333;
        }

        .comic-weiss:hover {
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
        }

        .comic-gruen {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: white;
        }

        .comic-gruen:hover {
            background: linear-gradient(135deg, #00cc66 0%, #009944 100%);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .radial-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .radial-bg::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, rgba(0, 170, 255, 0.05) 50%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="radial-bg"></div>

    <header class="banner">
        <h1>CANNALOG!</h1>
    </header>

    <div class="controls">
        <button class="comic-weiss">Comic Weiß</button>
        <button class="comic-gruen">Comic Grün</button>
    </div>

    <footer class="footer">
        RADIAL COMIC FX V5.0
    </footer>

    <script>
        // Add click handlers for smoke testing
        document.querySelector('.comic-weiss').addEventListener('click', () => {
            document.body.style.background = 'linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%)';
            document.body.style.color = '#333';
        });

        document.querySelector('.comic-gruen').addEventListener('click', () => {
            document.body.style.background = 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%)';
            document.body.style.color = 'white';
        });

        // Log accessibility info for smoke testing
        console.log('GreenLog Comic Radial Smoke - Loaded successfully');
        console.log('Elements:', document.querySelectorAll('*').length);
    </script>
</body>
</html>
